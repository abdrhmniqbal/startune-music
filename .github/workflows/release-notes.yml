name: Release Notes

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag (example: v1.2.3 or v1.2.3-rc.1)"
        required: true
        type: string
    secrets:
      token:
        required: true

jobs:
  generate-release-notes:
    name: Generate and Apply Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release body (categorized)
        env:
          GH_TOKEN: ${{ secrets.token }}
        run: |
          set -euo pipefail
          CURRENT_TAG="${{ inputs.release_tag }}"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)"

          if [ -n "${PREVIOUS_TAG}" ]; then
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
            COMPARE_URL="https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
            COMPARE_URL=""
          fi

          NOTES_PATH="release-body.md"
          FEATURES_FILE="$(mktemp)"
          CHANGES_FILE="$(mktemp)"
          FIXES_FILE="$(mktemp)"

          resolve_author_ref() {
            local commit_sha="$1"
            local commit_author_name="$2"
            local commit_author_email="$3"

            if [[ "${commit_author_email}" =~ ^([0-9]+\+)?([A-Za-z0-9-]+)@users\.noreply\.github\.com$ ]]; then
              echo "@${BASH_REMATCH[2]}"
              return
            fi

            if [[ "${commit_author_name}" =~ ^@ ]]; then
              echo "${commit_author_name}"
              return
            fi

            local api_login=""
            api_login="$(
              curl -fsSL \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${commit_sha}" \
                | jq -r '.author.login // empty' \
                || true
            )"

            if [ -n "${api_login}" ]; then
              echo "@${api_login}"
              return
            fi

            echo "${commit_author_name}"
          }

          to_sentence_case() {
            local value="$1"
            if [ -z "${value}" ]; then
              echo "${value}"
              return
            fi

            local first_char="${value:0:1}"
            local rest="${value:1}"
            echo "${first_char^^}${rest}"
          }

          while IFS=$'\t' read -r sha subject author_name author_email; do
            if [ -z "${sha}" ]; then
              continue
            fi

            author_ref="$(resolve_author_ref "${sha}" "${author_name}" "${author_email}")"

            clean_subject="${subject}"
            if [[ "${subject}" =~ ^feat(\(.+\))?:\ (.+)$ ]]; then
              clean_subject="${BASH_REMATCH[2]}"
              clean_subject="$(to_sentence_case "${clean_subject}")"
              first_word="$(echo "${clean_subject}" | awk '{print $1}')"
              if [[ "${first_word,,}" == "add" ]]; then
                printf -- '- %s (%s)\n' "${clean_subject}" "${author_ref}" >> "${FEATURES_FILE}"
              else
                printf -- '- %s (%s)\n' "${clean_subject}" "${author_ref}" >> "${CHANGES_FILE}"
              fi
            elif [[ "${subject}" =~ ^fix(\(.+\))?:\ (.+)$ ]]; then
              clean_subject="${BASH_REMATCH[2]}"
              clean_subject="$(to_sentence_case "${clean_subject}")"
              printf -- '- Fix %s (%s)\n' "${clean_subject}" "${author_ref}" >> "${FIXES_FILE}"
            fi
          done < <(git log --no-merges --pretty=format:'%H%x09%s%x09%an%x09%ae' "${RANGE}")

          {
            echo "Check out the [past release notes](https://github.com/${GITHUB_REPOSITORY}/releases) if you're upgrading from an earlier version."
            echo

            if [ -s "${FEATURES_FILE}" ]; then
              echo "## ✨ New Features"
              cat "${FEATURES_FILE}"
              echo
            fi

            if [ -s "${CHANGES_FILE}" ]; then
              echo "## ⚙️ Changes"
              cat "${CHANGES_FILE}"
              echo
            fi

            if [ -s "${FIXES_FILE}" ]; then
              echo "## 🧩 Fixes"
              cat "${FIXES_FILE}"
              echo
            fi

            if [ -n "${COMPARE_URL}" ]; then
              echo "**Full Changelog**:"
              echo "${COMPARE_URL}"
            fi
          } > "${NOTES_PATH}"

          echo "RELEASE_BODY_PATH=${NOTES_PATH}" >> "$GITHUB_ENV"

      - name: Update release draft body
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ inputs.release_tag }}
          tag_name: ${{ inputs.release_tag }}
          token: ${{ secrets.token }}
          body_path: ${{ env.RELEASE_BODY_PATH }}
          draft: true
          prerelease: ${{ contains(inputs.release_tag, '-rc.') }}
          generate_release_notes: false
